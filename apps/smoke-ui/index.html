<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SSS Live Smoke Check</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #1b1f24;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: #5c6672;
      }

      button {
        border: 1px solid #1b1f24;
        border-radius: 6px;
        background: #1b1f24;
        color: white;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
        margin-top: 20px;
      }

      .check {
        border: 1px solid #d5dae1;
        border-radius: 8px;
        background: white;
        padding: 16px;
      }

      .check strong {
        display: block;
        margin-bottom: 8px;
      }

      .ok {
        color: #087443;
      }

      .fail {
        color: #b42318;
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #111827;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 16px;
        margin-top: 20px;
        min-height: 160px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SSS Live Smoke Check</h1>
      <p>Browser-driven check for the local API, auth cookies, CSRF, search, manual intake, TikTok config status, and worker visibility.</p>
      <button id="run">Run Live Check</button>
      <section class="grid" id="checks"></section>
      <pre id="log"></pre>
    </main>

    <script>
      const apiBase = new URLSearchParams(window.location.search).get("api") || "http://localhost:8000";
      let csrfToken = "";
      const checks = document.querySelector("#checks");
      const log = document.querySelector("#log");
      const button = document.querySelector("#run");

      function line(message) {
        log.textContent += `${message}\n`;
      }

      function setCheck(name, ok, detail) {
        const existing = document.querySelector(`[data-check="${name}"]`);
        const node = existing || document.createElement("article");
        node.className = "check";
        node.dataset.check = name;
        node.innerHTML = `<strong>${name}</strong><span class="${ok ? "ok" : "fail"}">${ok ? "PASS" : "FAIL"}</span><p>${detail}</p>`;
        if (!existing) {
          checks.appendChild(node);
        }
      }

      async function apiFetch(path, options = {}) {
        const headers = new Headers(options.headers || {});
        if (options.body && !(options.body instanceof FormData) && !headers.has("Content-Type")) {
          headers.set("Content-Type", "application/json");
        }
        if (csrfToken && !headers.has("x-csrf-token")) {
          headers.set("x-csrf-token", csrfToken);
        }
        const response = await fetch(`${apiBase}${path}`, {
          ...options,
          headers,
          credentials: "include",
        });
        const isJson = response.headers.get("content-type")?.includes("application/json");
        const payload = isJson ? await response.json() : await response.text();
        if (!response.ok) {
          throw new Error(typeof payload === "string" ? payload : payload.detail || "Request failed");
        }
        return payload;
      }

      async function run() {
        button.disabled = true;
        checks.textContent = "";
        log.textContent = "";
        try {
          const health = await apiFetch("/health");
          setCheck("API health", health.status === "ok", JSON.stringify(health));

          const login = await apiFetch("/auth/login", {
            method: "POST",
            body: JSON.stringify({ email: "admin@example.com", password: "admin123" }),
          });
          csrfToken = login.csrf_token;
          setCheck("Auth + CSRF", Boolean(csrfToken), `Logged in as ${login.user.email}`);

          const me = await apiFetch("/auth/me");
          setCheck("Session cookie", me.user.email === "admin@example.com", `Session expires ${me.session.expires_at}`);

          const beforeSearch = await apiFetch("/search?q=Smoke&limit=5");
          setCheck("Search endpoint", Array.isArray(beforeSearch.songs), `Strategy: ${beforeSearch.strategy}`);

          const form = new FormData();
          form.set("title", `Smoke Song ${Date.now()}`);
          form.set("artist", "Live Tester");
          form.set("environment", "prod");
          form.set("rights_status", "licensed");
          form.set("audio", new File([new Uint8Array([1, 2, 3, 4])], "live-smoke.mp3", { type: "audio/mpeg" }));
          form.set("lyrics", new File(["[00:00.00]hello from smoke test"], "live-smoke.lrc", { type: "text/plain" }));
          const intake = await apiFetch("/manual-intake", { method: "POST", body: form });
          setCheck("Manual intake", Boolean(intake.song?.id), `${intake.song.artist} - ${intake.song.title}`);

          const search = await apiFetch(`/search?q=${encodeURIComponent(intake.song.title)}&limit=5`);
          setCheck("Search finds intake", search.songs.some((song) => song.id === intake.song.id), `${search.songs.length} song result(s)`);

          const dashboard = await apiFetch("/dashboard/summary");
          setCheck("Dashboard summary", dashboard.counts.songs >= 1, `${dashboard.counts.songs} song(s), ${dashboard.counts.open_alerts} alert(s)`);

          const workers = await apiFetch("/workers");
          setCheck("Worker API", Array.isArray(workers.workers), `${workers.workers.length} worker record(s)`);

          const tiktok = await apiFetch("/integrations/tiktok/status");
          setCheck("TikTok settings", Boolean(tiktok.integration), `configured=${tiktok.integration.configured}, simulated=${tiktok.integration.simulate_uploads}`);

          const connect = await apiFetch("/integrations/tiktok/connect", { method: "POST" });
          setCheck("TikTok OAuth URL", connect.auth_url.startsWith("https://www.tiktok.com/"), "OAuth state and configured keys accepted");

          line("Live check completed.");
          line(JSON.stringify({ intake: intake.song.id, searchStrategy: search.strategy, workers: workers.workers.length }, null, 2));
        } catch (error) {
          line(error.stack || error.message);
        } finally {
          button.disabled = false;
        }
      }

      button.addEventListener("click", run);
      run();
    </script>
  </body>
</html>
