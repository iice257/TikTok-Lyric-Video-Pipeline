services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/platform.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://platform:platform@postgres:5432/platform
      MEDIA_ROOT: /app/storage
      PIPELINE_CONFIG_PATH: /app/config/pipeline.example.json
      API_HOST: 0.0.0.0
    command: ["python", "-m", "tiktok_platform_api.app"]
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config
      - ./data:/app/data
      - ./output:/app/output

  worker:
    build:
      context: .
      dockerfile: docker/platform.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://platform:platform@postgres:5432/platform
      MEDIA_ROOT: /app/storage
      PIPELINE_CONFIG_PATH: /app/config/pipeline.example.json
    command: ["python", "-m", "tiktok_platform_worker.main", "--poll-interval-seconds", "20"]
    depends_on:
      - postgres
      - api
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config
      - ./data:/app/data
      - ./output:/app/output

volumes:
  postgres-data:
